<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportyStyle | Tienda Virtual</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
</head>
<body>

    <header>
        <nav>
            <div class="logo">SportyStyle</div>
            <div id="auth-buttons">
                <button id="btn-login">Iniciar Sesión</button>
                <div id="user-info" class="hidden">
                    <span id="welcome-msg"></span>
                    <button id="btn-logout">Cerrar Sesión</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h1>Equípate con lo mejor</h1>
            <p>Ropa deportiva para tu máximo rendimiento.</p>
        </section>

        <section id="productos" class="grid-container">
            </section>

        <aside id="carrito-section">
            <h2>Tu Carrito</h2>
            <div id="carrito-items">
                </div>
            <div class="total-container">
                <strong>Total: $<span id="total-precio">0</span></strong>
            </div>
            <button id="btn-ir-pago" class="btn-primary">Proceder al Pago</button>
        </aside>

        <section id="checkout-section" class="hidden">
            <h2>Finalizar Compra</h2>
            <form id="form-pago">
                <input type="text" id="nombre-completo" placeholder="Nombre Completo" required>
                <input type="email" id="email" placeholder="Correo Electrónico (@gmail.com)" required>
                <input type="text" id="direccion" placeholder="Dirección de Envío" required>
                <input type="tel" id="telefono" placeholder="Teléfono (Ej: 912345678)" required>
                <button type="submit" class="btn-success">Confirmar y Pagar</button>
                <button type="button" id="btn-cancelar" class="btn-danger">Cancelar</button>
            </form>
        </section>

        <section id="confirmacion-section" class="hidden text-center">
            <div class="card-confirm">
                <h2>¡Gracias por tu compra!</h2>
                <div id="detalle-pedido"></div>
                <button onclick="location.reload()" class="btn-primary">Volver a la tienda</button>
            </div>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
